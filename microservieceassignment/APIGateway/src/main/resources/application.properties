spring.application.name=APIGateway
server.port=8088

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.mvc.routes[0].id=cart-route
spring.cloud.gateway.mvc.routes[0].uri=lb://CARTSERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/cart/**

spring.cloud.gateway.mvc.routes[1].id=catalogue-route
spring.cloud.gateway.mvc.routes[1].uri=lb://CATALOGUESERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.mvc.routes[2].id=price-route
spring.cloud.gateway.mvc.routes[2].uri=lb://PRICESERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/price/**

spring.cloud.gateway.mvc.routes[3].id=stock-route
spring.cloud.gateway.mvc.routes[3].uri=lb://STOCKSERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/stock/**

spring.cloud.gateway.mvc.routes[4].id=recommendation-route
spring.cloud.gateway.mvc.routes[4].uri=lb://RECOMMENDATIONSERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/recommendations/**